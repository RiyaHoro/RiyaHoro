<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Chat + Media + Video Call</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>Realtime Chat App</h1>
        <p>Chat, share media, and start a video call.</p>
      </header>

      <section class="controls card">
        <label for="username">Your name</label>
        <input id="username" type="text" placeholder="Enter your name" maxlength="24" />
      </section>

      <section class="chat card">
        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chat-form" class="row">
          <input id="message-input" type="text" placeholder="Type message..." required />
          <button type="submit">Send</button>
        </form>

        <form id="media-form" class="row" enctype="multipart/form-data">
          <input id="media-input" type="file" name="media" required />
          <button type="submit">Send Media</button>
        </form>
      </section>

      <section class="video card">
        <div class="row gap">
          <button id="start-call">Start Video Call</button>
          <button id="end-call" class="danger">End Call</button>
        </div>
        <div class="video-grid">
          <div>
            <h3>You</h3>
            <video id="local-video" autoplay playsinline muted></video>
          </div>
          <div>
            <h3>Remote</h3>
            <video id="remote-video" autoplay playsinline></video>
          </div>
        </div>
      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
  </body>
</html>
